<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOTWEB XML to PDF Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root { --black:#000; --gray:#d9d9d9; --border:#222; --blue:#18a8d4; --bg:#f5f7fb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:#111; }
  .wrap { max-width: 980px; margin: 28px auto; padding: 0 18px; }
  .card { background:white; border:1px solid #ddd; border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,.08); overflow:hidden; }
  .head { padding:20px 24px; background:#111827; color:white; }
  .head h1 { margin:0 0 6px; font-size:22px; }
  .head p { margin:0; font-size:14px; color:#d1d5db; }
  .body { padding:24px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  label { display:block; font-weight:700; margin-bottom:7px; font-size:14px; }
  input[type="file"], input[type="text"], input[type="number"], select { width:100%; padding:11px 12px; border:1px solid #cfd6e0; border-radius:10px; font-size:14px; background:white; }
  .full { grid-column:1 / -1; }
  .hint { font-size:12px; color:#5b6472; margin-top:6px; line-height:1.45; }
  .btnrow { display:flex; gap:12px; flex-wrap:wrap; margin-top:22px; }
  button { border:0; border-radius:10px; padding:12px 18px; font-weight:700; cursor:pointer; font-size:14px; }
  .primary { background:#0f172a; color:white; }
  .secondary { background:#e5e7eb; color:#111827; }
  .blue { background:#dff3ff; color:#075985; }
  .green { background:#dcfce7; color:#166534; }
  .status { margin-top:18px; padding:14px; border-radius:10px; background:#f3f4f6; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; white-space:pre-wrap; font-size:13px; min-height:48px; }
  .preview { margin-top:22px; border-top:1px solid #e5e7eb; padding-top:18px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { border:1px solid #ddd; padding:7px 8px; text-align:left; vertical-align:top; word-break:break-word; }
  th { background:#f3f4f6; }
  .xmlbox{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;background:#0b1720;color:#d6f7ff;border-radius:10px;padding:12px;max-height:220px;overflow:auto;font-size:12px;margin-top:12px}
  @media(max-width:720px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <h1>MOTWEB XML to PDF Generator</h1>
      <p>Upload an FIU/MOT XML file or receive XML directly from the Trust Transaction Monitoring demo.</p>
    </div>
    <div class="body">
      <div class="grid">
        <div class="full">
          <label for="xmlFile">XML file</label>
          <input type="file" id="xmlFile" accept=".xml,text/xml,application/xml" />
          <div class="hint">No data is uploaded to a server. The XML is parsed in this browser tab only.</div>
        </div>
        <div>
          <label for="language">PDF language / layout</label>
          <select id="language">
            <option value="nl" selected>Dutch MOTWEB-style output</option>
            <option value="en">English reporting-form terminology</option>
          </select>
        </div>
        <div>
          <label for="filenamePrefix">Download filename prefix</label>
          <input type="text" id="filenamePrefix" value="MOTWEB" />
        </div>
        <div>
          <label for="tradeNameOverride">Trade name override</label>
          <input type="text" id="tradeNameOverride" placeholder="Optional; leave empty to use XML metadata/source" />
        </div>
        <div>
          <label for="serialOverride">Report sequence override</label>
          <input type="number" id="serialOverride" min="1" step="1" placeholder="Optional; leave empty to use XML sequence" />
          <div class="hint">Report number format follows mmddyyxxx, e.g. 051326001.</div>
        </div>
      </div>
      <div class="btnrow">
        <button class="primary" id="generateBtn">Generate and download PDF</button>
        <button class="secondary" id="previewBtn">Parse / preview XML</button>
        <button class="blue" id="loadHandoffBtn">Load XML from transaction monitoring</button>
        <button class="green" id="downloadXmlBtn">Download current XML</button>
        <button class="secondary" id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status">Ready.</div>
      <div class="xmlbox" id="xmlText" style="display:none"></div>
      <div class="preview" id="preview"></div>
    </div>
  </div>
</div>
<script>
let currentXml = '';
let currentDoc = null;
const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const xmlTextEl = document.getElementById('xmlText');
function setStatus(msg){ statusEl.textContent = msg; }
function esc(s){ return String(s ?? '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function tag(doc, name){ const el = doc.getElementsByTagName(name)[0]; return el ? el.textContent.trim() : ''; }
function parseXmlText(xml){
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'application/xml');
  if (doc.getElementsByTagName('parsererror').length) throw new Error('Invalid XML structure.');
  currentXml = xml;
  currentDoc = doc;
  xmlTextEl.style.display = 'block';
  xmlTextEl.textContent = xml.slice(0, 8000);
  return doc;
}
function loadFromHandoff(){
  const xml = localStorage.getItem('axioma_motweb_xml') || '';
  const caseId = localStorage.getItem('axioma_motweb_case') || '';
  const filename = localStorage.getItem('axioma_motweb_filename') || '';
  if(!xml){ setStatus('No XML handoff found. Generate XML first in the transaction monitoring demo.'); return; }
  try{
    const doc = parseXmlText(xml);
    if(filename) document.getElementById('filenamePrefix').value = filename;
    setStatus('Loaded XML from transaction monitoring' + (caseId ? ' for ' + caseId : '') + '.');
    renderPreview(doc);
  }catch(e){ setStatus('Could not load XML handoff: ' + e.message); }
}
function readFile(){
  const file = document.getElementById('xmlFile').files[0];
  if(!file) return Promise.reject(new Error('Please select an XML file or load XML from transaction monitoring.'));
  return file.text().then(xml => parseXmlText(xml));
}
function getDoc(){
  if(currentDoc) return Promise.resolve(currentDoc);
  return readFile();
}
function renderPreview(doc){
  const rows = [
    ['Case reference', tag(doc,'InternalCaseReference')],
    ['Reporting entity', tag(doc,'ReportingEntity')],
    ['Client', tag(doc,'LegalName')],
    ['Aruba company', tag(doc,'ArubaCompany')],
    ['Chamber of Commerce', tag(doc,'ChamberOfCommerce')],
    ['UBO', tag(doc,'UBO')],
    ['Director', tag(doc,'Director')],
    ['Transaction ID', tag(doc,'TransactionID')],
    ['Type', tag(doc,'Type')],
    ['Amount', tag(doc,'Amount') + ' ' + tag(doc,'Currency')],
    ['Counterparty', tag(doc,'Counterparty')],
    ['Country route', tag(doc,'CountryRoute')],
    ['Indicator code', tag(doc,'Code')],
    ['Rationale', tag(doc,'Rationale')],
    ['Deadline', tag(doc,'Deadline')],
    ['Status', tag(doc,'Status')]
  ];
  previewEl.innerHTML = '<h2>Parsed XML preview</h2><table><tbody>' + rows.map(r => '<tr><th>'+esc(r[0])+'</th><td>'+esc(r[1])+'</td></tr>').join('') + '</tbody></table>';
}
function downloadCurrentXml(){
  if(!currentXml){ setStatus('No current XML available. Load or generate XML first.'); return; }
  const prefix = document.getElementById('filenamePrefix').value || 'MOTWEB';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([currentXml], {type:'application/xml'}));
  a.download = prefix + '.xml';
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus('XML downloaded: ' + prefix + '.xml');
}
function generatePdf(){
  getDoc().then(doc => {
    renderPreview(doc);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'p', unit:'mm', format:'a4'});
    const prefix = document.getElementById('filenamePrefix').value || 'MOTWEB';
    const title = 'MOTWEB / FIU Aruba Report Preview';
    let y = 14;
    pdf.setFont('helvetica','bold'); pdf.setFontSize(15); pdf.text(title, 14, y); y += 8;
    pdf.setFont('helvetica','normal'); pdf.setFontSize(9);
    pdf.text('Generated locally in browser. Demo preview only.', 14, y); y += 8;
    const sections = [
      ['1. Reporting Entity', [['Reporting entity',tag(doc,'ReportingEntity')],['Case reference',tag(doc,'InternalCaseReference')],['Generated at',tag(doc,'GeneratedAt')],['Submission mode',tag(doc,'SubmissionMode')]]],
      ['2. Client / Subject Information', [['Legal name',tag(doc,'LegalName')],['Aruba company',tag(doc,'ArubaCompany')],['Chamber of Commerce',tag(doc,'ChamberOfCommerce')],['UBO',tag(doc,'UBO')],['Director',tag(doc,'Director')],['Authorized signatory',tag(doc,'AuthorizedSignatory')],['Identity document',tag(doc,'IdentityDocument')],['Risk rating',tag(doc,'RiskRating')]]],
      ['3. Transaction Information', [['Transaction ID',tag(doc,'TransactionID')],['Date/time',tag(doc,'DateTime')],['Type',tag(doc,'Type')],['Amount',tag(doc,'Amount') + ' ' + tag(doc,'Currency')],['Counterparty',tag(doc,'Counterparty')],['Country route',tag(doc,'CountryRoute')],['Invoice/agreement',tag(doc,'InvoiceOrAgreement')]]],
      ['4. Indicator and Circumstances', [['Indicator code',tag(doc,'Code')],['Description',tag(doc,'Description')],['Trigger source',tag(doc,'TriggerSource')],['MLCO rationale',tag(doc,'Rationale')],['Deadline',tag(doc,'Deadline')],['Status',tag(doc,'Status')]]],
      ['5. Shufti / CDD Context', [['KYB status',tag(doc,'KYBStatus')],['KYC status',tag(doc,'KYCStatus')],['Sanctions',tag(doc,'Sanctions')],['PEP',tag(doc,'PEP')],['Adverse media',tag(doc,'AdverseMedia')],['Source of funds',tag(doc,'SourceOfFunds')],['Source of wealth',tag(doc,'SourceOfWealth')]]]
    ];
    sections.forEach(([heading, rows]) => {
      if(y > 265){ pdf.addPage(); y = 14; }
      pdf.setFont('helvetica','bold'); pdf.setFontSize(11); pdf.text(heading, 14, y); y += 6;
      pdf.setFont('helvetica','normal'); pdf.setFontSize(9);
      rows.forEach(([k,v]) => {
        const text = k + ': ' + (v || '');
        const lines = pdf.splitTextToSize(text, 180);
        if(y + lines.length * 5 > 282){ pdf.addPage(); y = 14; }
        pdf.text(lines, 16, y); y += lines.length * 5 + 1;
      });
      y += 3;
    });
    pdf.save(prefix + '.pdf');
    setStatus('PDF generated and downloaded: ' + prefix + '.pdf');
  }).catch(e => setStatus('PDF generation failed: ' + e.message));
}
document.getElementById('loadHandoffBtn').onclick = loadFromHandoff;
document.getElementById('previewBtn').onclick = () => getDoc().then(renderPreview).then(()=>setStatus('XML parsed successfully.')).catch(e=>setStatus(e.message));
document.getElementById('generateBtn').onclick = generatePdf;
document.getElementById('downloadXmlBtn').onclick = downloadCurrentXml;
document.getElementById('clearBtn').onclick = () => { currentXml=''; currentDoc=null; previewEl.innerHTML=''; xmlTextEl.style.display='none'; xmlTextEl.textContent=''; document.getElementById('xmlFile').value=''; setStatus('Cleared.'); };
document.getElementById('xmlFile').addEventListener('change', () => readFile().then(doc => { renderPreview(doc); setStatus('XML file loaded.'); }).catch(e => setStatus(e.message)));
if(new URLSearchParams(location.search).get('source') === 'trust-transaction-monitoring'){
  loadFromHandoff();
}
</script>
</body>
</html>
