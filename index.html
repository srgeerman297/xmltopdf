<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOTWEB XML to PDF Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root { --black:#000; --gray:#d9d9d9; --border:#222; --blue:#18a8d4; --bg:#f5f7fb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:#111; }
  .wrap { max-width: 980px; margin: 28px auto; padding: 0 18px; }
  .card { background:white; border:1px solid #ddd; border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,.08); overflow:hidden; }
  .head { padding:20px 24px; background:#111827; color:white; }
  .head h1 { margin:0 0 6px; font-size:22px; }
  .head p { margin:0; font-size:14px; color:#d1d5db; }
  .body { padding:24px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  label { display:block; font-weight:700; margin-bottom:7px; font-size:14px; }
  input[type="file"], input[type="text"], input[type="number"], select { width:100%; padding:11px 12px; border:1px solid #cfd6e0; border-radius:10px; font-size:14px; background:white; }
  .full { grid-column:1 / -1; }
  .hint { font-size:12px; color:#5b6472; margin-top:6px; line-height:1.45; }
  .btnrow { display:flex; gap:12px; flex-wrap:wrap; margin-top:22px; }
  button { border:0; border-radius:10px; padding:12px 18px; font-weight:700; cursor:pointer; font-size:14px; }
  .primary { background:#0f172a; color:white; }
  .secondary { background:#e5e7eb; color:#111827; }
  .status { margin-top:18px; padding:14px; border-radius:10px; background:#f3f4f6; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; white-space:pre-wrap; font-size:13px; min-height:48px; }
  .preview { margin-top:22px; border-top:1px solid #e5e7eb; padding-top:18px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { border:1px solid #ddd; padding:7px 8px; text-align:left; vertical-align:top; word-break:break-word; }
  th { background:#f3f4f6; }
  @media(max-width:720px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <h1>MOTWEB XML to PDF Generator</h1>
      <p>Upload an FIU/MOT XML file and generate a MOTWEB-style PDF locally in your browser.</p>
    </div>
    <div class="body">
      <div class="grid">
        <div class="full">
          <label for="xmlFile">XML file</label>
          <input type="file" id="xmlFile" accept=".xml,text/xml,application/xml" />
          <div class="hint">No data is uploaded to a server. The XML is parsed in this browser tab only.</div>
        </div>
        <div>
          <label for="language">PDF language / layout</label>
          <select id="language">
            <option value="nl" selected>Dutch MOTWEB-style output</option>
            <option value="en">English reporting-form terminology</option>
          </select>
        </div>
        <div>
          <label for="filenamePrefix">Download filename prefix</label>
          <input type="text" id="filenamePrefix" value="MOTWEB" />
        </div>
        <div>
          <label for="tradeNameOverride">Trade name override</label>
          <input type="text" id="tradeNameOverride" placeholder="Optional; leave empty to use XML metadata/source" />
        </div>
        <div>
          <label for="serialOverride">Report sequence override</label>
          <input type="number" id="serialOverride" min="1" step="1" placeholder="Optional; leave empty to use XML sequence" />
          <div class="hint">Report number format follows mmddyyxxx, e.g. 051326001.</div>
        </div>
      </div>
      <div class="btnrow">
        <button class="primary" id="generateBtn">Generate and download PDF</button>
        <button class="secondary" id="previewBtn">Parse / preview XML</button>
        <button class="secondary" id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status">Ready.</div>
      <div class="preview" id="preview"></div>
    </div>
  </div>
</div>

  const $ = id => document.getElementById(id);
  const status = msg => $('status').textContent = msg;
  const textOf = (node, path) => {
    const found = node ? node.querySelector(path) : null;
    return found ? (found.textContent || '').trim() : '';
  };
  const fmtDate = d => {
    if(!d) return '';
    const y=textOf(d,'year'), m=textOf(d,'month'), day=textOf(d,'day');
    return (m && day && y) ? `${m}-${day}-${y}` : '';
  };
  const initials = names => {
    if(!names) return '';
    return names.split(/\s+/).filter(Boolean).map(x => x[0].toUpperCase()+'.').join('');
  };
  const genderText = (g, lang) => {
    const v=(g||'').toUpperCase();
    if(lang==='nl') return v==='M'?'man':v==='F'?'vrouw':g||'';
    return v==='M'?'male':v==='F'?'female':g||'';
  };
  const roleText = (row, lang) => {
    const isClient = textOf(row,'subject_isclient');
    const code = textOf(row,'subject_role') || textOf(row,'role') || '';
    if(code) return code;
    return isClient === 'Y' ? (lang==='nl' ? 'Opdrachtgever' : 'Initiator') : '';
  };
  const clientText = (row, lang) => textOf(row,'subject_isclient')==='Y' ? (lang==='nl'?'Klant':'Client') : '';

  function reportNumber(data, seqOverride){
    const r = data.reportCode;
    const yy = (r.year || '').slice(-2), mm = r.month || '', dd = r.day || '';
    const seq = String(seqOverride || r.sequence || 1).padStart(3,'0');
    return `${mm}${dd}${yy}${seq}`;
  }

  function parseXmlDoc(xmlDoc){
    const reportCode = xmlDoc.querySelector('data > report_code') || xmlDoc.querySelector('report_code');
    const tx = xmlDoc.querySelector('transaction_list > transaction_row') || xmlDoc.querySelector('transaction_row');

    const subjectRows = [...xmlDoc.querySelectorAll('subject_list > subject_row')];
    const created = xmlDoc.querySelector('metadata > created');
    return {
      source: textOf(xmlDoc,'metadata > source'),
      created: fmtDate(created),
      reportCode: {
        year: textOf(reportCode,'year'), month: textOf(reportCode,'month'), day: textOf(reportCode,'day'), sequence: textOf(reportCode,'sequence')
      },
      description: textOf(xmlDoc,'data > description') || textOf(xmlDoc,'description'),
      indicators,
      transaction: {
        type: textOf(tx,'transaction_type'),
        date: fmtDate(tx ? tx.querySelector('transaction_date') : null),
        time: (() => { const t = tx ? tx.querySelector('transaction_time') : null; const h=textOf(t,'hour'), m=textOf(t,'minute'); return h&&m?`${h}:${m}`:''; })(),

            subjectCode: textOf(row,'subject_code'),

            cocPlace: textOf(lp,'chamber_of_commerce_place'),

            addition: textOf(addr,'addition') || textOf(addr,'addition_to_house_number'),
            city: textOf(addr,'city'),
            postal: textOf(addr,'postalcode') || textOf(addr,'zipcode'),
            country: textOf(addr,'country'),
            phone: textOf(row,'phone') || textOf(row,'telephone'),
            email: textOf(row,'email')
          };
        })
      }
    };
  }

  function readSelectedFile(){
    return new Promise((resolve, reject) => {
      const file = $('xmlFile').files[0];
      if(!file) return reject(new Error('Select an XML file first.'));
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error || new Error('Could not read file.'));
      reader.readAsText(file);
    });
  }

  function validateParse(xmlText){
    const xmlDoc = new DOMParser().parseFromString(xmlText, 'application/xml');
    const parserError = xmlDoc.querySelector('parsererror');
    if(parserError) throw new Error('Invalid XML: ' + parserError.textContent.slice(0,180));
    return parseXmlDoc(xmlDoc);
  }

  function previewData(data){
    const rn = reportNumber(data, $('serialOverride').value || '');
    const first = data.transaction.subjects[0] || {};
    $('preview').innerHTML = `
      <h3>Parsed XML preview</h3>
      <table>
        <tr><th>Field</th><th>Value</th></tr>
        <tr><td>Trade name</td><td>${escapeHtml($('tradeNameOverride').value || data.source || '')}</td></tr>
        <tr><td>Report number</td><td>${escapeHtml(rn)}</td></tr>
        <tr><td>Description</td><td>${escapeHtml(data.description)}</td></tr>
        <tr><td>Indicators</td><td>${escapeHtml(data.indicators.join(', '))}</td></tr>
        <tr><td>Transaction</td><td>${escapeHtml(`${data.transaction.date} | ${data.transaction.status} | ${data.transaction.type} | ${data.transaction.amount} ${data.transaction.currency}`)}</td></tr>
        <tr><td>First subject</td><td>${escapeHtml(`${first.firstnames||first.legalName||''} ${first.birthname||''}`.trim())}</td></tr>
        <tr><td>Subjects found</td><td>${data.transaction.subjects.length}</td></tr>
      </table>`;
  }
  function escapeHtml(s){ return String(s||'').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

  function drawHeader(doc, title){
    // Use the exact MOTWEB header artwork from the reference PDF.
    // This avoids browser/PDF font fallback issues that can turn logo symbols into incorrect glyphs.
    const W = doc.internal.pageSize.getWidth();
    const x = 10;
    const y = 10;
    const w = W - 20;
    const h = 48.7;
    doc.addImage(MOTWEB_HEADER_NL_PNG, 'PNG', x, y, w, h);

    // Dutch MOTWEB output uses the embedded header exactly as-is.
    // English output keeps the same official logo block and only replaces the title bar text.
    if(title !== 'MELDFORMULIER ONGEBRUIKELIJKE TRANSACTIES'){
      doc.setFillColor(0,0,0);
      doc.rect(x, y, w, 8.9, 'F');
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.text(title, W/2, y+6.4, {align:'center'});
      doc.setTextColor(0,0,0);
    }
    return y + h;
  }
  function footer(doc, page, total){
    const W = doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    doc.setDrawColor(90); doc.line(10,H-10,W-10,H-10);
    doc.setFontSize(8); doc.setTextColor(0); doc.text(`${page} / ${total}`, W-10, H-6, {align:'right'});
  }
  function blackBar(doc, y, txt){
    doc.setFillColor(0,0,0); doc.rect(10,y,190,7,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.text(txt,12,y+5);
    doc.setTextColor(0,0,0); return y+7;
  }
  function row(doc, y, label, value, lh=7, labelW=95){
    doc.setDrawColor(0); doc.setLineWidth(0.2);
    doc.rect(10,y,labelW,lh); doc.rect(10+labelW,y,190-labelW,lh);
    doc.setFontSize(9); doc.setTextColor(0); doc.text(label,12,y+4.8);
    const txt = doc.splitTextToSize(value || '', 190-labelW-4);
    doc.text(txt,10+labelW+2,y+4.8);
    return y+lh;
  }
  function valueOnlyRow(doc, y, value, h=10){
    doc.rect(10,y,190,h);
    doc.setFontSize(9); doc.text(doc.splitTextToSize(value||'',186),12,y+5);
    return y+h;
  }
  function indicatorTable(doc, y, codes, lang){
    const map = lang==='nl' ? INDICATORS_NL : INDICATORS_EN;
    y = blackBar(doc,y, lang==='nl'?'Indicator':'Indicator');
    doc.setFillColor(217,217,217); doc.rect(10,y,95,7,'F'); doc.rect(105,y,95,7,'F'); doc.rect(10,y,95,7); doc.rect(105,y,95,7);
    doc.setFontSize(9); doc.text('Code',12,y+5); doc.text(codes.map(c => (map[c]||['',''])[0]).join(' / ') || (lang==='nl'?'Subjectieve Indicatoren':'Subjective indicator'),107,y+5);
    y += 7;
    codes.forEach(code => {
      const desc = (map[code] || ['', 'Unknown indicator code'])[1];
      const lines = doc.splitTextToSize(desc, 90);
      const h = Math.max(13, lines.length*5+4);
      doc.rect(10,y,95,h); doc.rect(105,y,95,h);
      doc.text(code,12,y+8); doc.text(lines,107,y+5);
      y += h;
    });
    return y;
  }
  function subjectSummary(s, lang){
    if(s.isNatural) return `${s.firstnames || ''} ${s.birthname || ''} (${s.role || ''}) ${s.isClient || ''} ${s.country || ''}`.replace(/\s+/g,' ').trim();
    return `${s.legalName || s.tradeName || ''} (${s.role || ''}) ${s.isClient || ''} ${s.country || ''}`.replace(/\s+/g,' ').trim();
  }

  function createPdf(data){
    if(!window.jspdf || !window.jspdf.jsPDF) throw new Error('PDF library did not load. Check your internet connection or CDN access.');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    const lang = $('language').value;
    const title = lang==='nl' ? 'MELDFORMULIER ONGEBRUIKELIJKE TRANSACTIES' : 'REPORTING FORM';
    const tradeName = $('tradeNameOverride').value.trim() || data.source || '';
    const rn = reportNumber(data, $('serialOverride').value || '');
    let page = 1;
    let y = drawHeader(doc,title);
    y = blackBar(doc,y, lang==='nl'?'Naam melder':'Name of the reporting entity');
    y = row(doc,y, lang==='nl'?'Handelsnaam:':'Trade name:', tradeName);
    y = blackBar(doc,y, lang==='nl'?'Melding':'Report');
    y = row(doc,y, lang==='nl'?'Meldingsnummer:':'Report number:', rn);
    y += 8;
    y = blackBar(doc,y, lang==='nl'?'Toelichting':'Transaction description');
    y = valueOnlyRow(doc,y,data.description,14);
    y += 7;
    y = indicatorTable(doc,y,data.indicators,lang);

    doc.addPage(); page++;
    y = 14;
    y = blackBar(doc,y, lang==='nl'?'Transactiegegevens':'Transaction information');
    y = row(doc,y, lang==='nl'?'Datum transactie:':'Transaction date:', data.transaction.date);
    y = row(doc,y, lang==='nl'?'Tijd:':'Time:', data.transaction.time);
    y = row(doc,y, lang==='nl'?'Stadium van transactie:':'Stage of the transaction:', data.transaction.status==='EXECUTED' ? (lang==='nl'?'uitgevoerd':'executed') : (data.transaction.status||'').toLowerCase());
    y = row(doc,y, lang==='nl'?'Transactietype:':'Transaction type:', data.transaction.type);
    y = row(doc,y, lang==='nl'?'Bedrag / valuta:':'Amount / currency:', `${data.transaction.amount} ${data.transaction.currency}`);
    y = row(doc,y, lang==='nl'?'Bedrag, gespecificeerd per valutasoort:':'Amount specified per currency and denomination:', data.transaction.purpose || '');
    y += 8;
    y = blackBar(doc,y, lang==='nl'?'Specificatie transactie':'Transaction specification');
    const summary = data.transaction.subjects.map(s => subjectSummary(s,lang)).join('\n');
    y = valueOnlyRow(doc,y,summary, Math.max(16, data.transaction.subjects.length*7+6));

    data.transaction.subjects.forEach((s, idx) => {
      doc.addPage(); page++;
      y = 14;
      const displayName = s.isNatural ? `${s.initials ? s.initials.replace(/\./g,'')+' ' : ''}${s.birthname || ''}`.trim() : (s.legalName || s.tradeName || '');
      y = blackBar(doc,y, s.isNatural ? `${lang==='nl'?'NATUURLIJKE PERSOON':'NATURAL PERSON'} - ${displayName || idx+1}` : `${lang==='nl'?'RECHTSPERSOON':'LEGAL PERSON'} - ${displayName || idx+1}`);
      y = valueOnlyRow(doc,y,s.role || '',7);
      if(s.isNatural){
        y = blackBar(doc,y, lang==='nl'?'Subjectgegevens':'Subject information');
        y = row(doc,y, lang==='nl'?'Eigen naam:':'Last (maiden) name:', s.birthname);
        y = row(doc,y, lang==='nl'?'Gehuwde naam:':'Married name:', '');
        y = row(doc,y, lang==='nl'?'Initialen:':'Initials:', s.initials);
        y = row(doc,y, lang==='nl'?'Voornamen:':'Given name(s):', s.firstnames);
        y = row(doc,y, lang==='nl'?'Geslacht:':'Gender:', genderText(s.gender,lang));
        y = row(doc,y, lang==='nl'?'Geboortedatum:':'Date of birth:', s.birthDate);
        y = row(doc,y, lang==='nl'?'Geboorteplaats:':'Place of birth:', s.birthCity);
        y = row(doc,y, lang==='nl'?'Geboorteland:':'Country of birth:', s.birthCountry);
        y = row(doc,y, lang==='nl'?'Land nationaliteit:':'Country of nationality:', s.nationality);
        y = blackBar(doc,y, lang==='nl'?'Legitimatiegegevens':'Identification information');
        y = row(doc,y, lang==='nl'?'Type:':'Type:', s.idType);
        y = row(doc,y, lang==='nl'?'Nummer:':'Number:', s.idNumber);
        y = row(doc,y, lang==='nl'?'Uitgiftedatum:':'Date of issue:', s.idIssueDate);
        y = row(doc,y, lang==='nl'?'Vervaldatum:':'Expiration date:', s.idExpirationDate);
        y = row(doc,y, lang==='nl'?'Plaats van uitgifte:':'Place of issue:', s.idIssuePlace, 10);
        y = row(doc,y, lang==='nl'?'Land van uitgifte:':'Country of issuance:', s.idIssueCountry);
        y = row(doc,y, lang==='nl'?'Land nationaliteit:':'Country of nationality:', s.nationality);
      } else {
        y = blackBar(doc,y, lang==='nl'?'Subjectgegevens':'Subject information');
        y = row(doc,y, lang==='nl'?'Statutaire naam:':'Statutory name:', s.legalName);
        y = row(doc,y, lang==='nl'?'Handelsnaam:':'Trade name:', s.tradeName);
        y = row(doc,y, lang==='nl'?'Type rechtspersoon:':'Type of legal entity:', s.legalType);
        y = row(doc,y, lang==='nl'?'KvK nummer:':'Chamber of Commerce registration number:', s.cocNumber);
        y = row(doc,y, lang==='nl'?'Plaats KvK:':'Place of Chamber of Commerce:', s.cocPlace);
        y = row(doc,y, lang==='nl'?'Land KvK:':'Country of Chamber of Commerce:', s.cocCountry);
      }
      y = blackBar(doc,y, lang==='nl'?'Adresgegevens':'Address information');
      y = row(doc,y, lang==='nl'?'Straatnaam:':'Street name:', s.street);
      y = row(doc,y, lang==='nl'?'Huisnummer:':'House number:', s.houseNumber);
      y = row(doc,y, lang==='nl'?'Toevoeging bij huisnummer:':'Addition to the house number:', s.addition);
      y = row(doc,y, lang==='nl'?'Plaats:':'Place/City:', s.city);
      y = row(doc,y, lang==='nl'?'Postcode:':'Postal/Zip code:', s.postal);
      y = row(doc,y, lang==='nl'?'Land:':'Country:', s.country);
      y = blackBar(doc,y, lang==='nl'?'Telefoongegevens':'Telephone information');
      y = row(doc,y, lang==='nl'?'Telefoonnummer:':'Country code and telephone number:', s.phone);
      y = blackBar(doc,y, 'Email');
      y = row(doc,y, lang==='nl'?'Email adres:':'Email address:', s.email);
    });

    const total = page;
    for(let i=1; i<=total; i++){ doc.setPage(i); footer(doc,i,total); }
    const safePrefix = ($('filenamePrefix').value || 'MOTWEB').replace(/[^a-z0-9_-]/gi,'_');
    doc.save(`${safePrefix}_${rn}.pdf`);
    return {rn,total,subjects:data.transaction.subjects.length};
  }

  $('previewBtn').addEventListener('click', async () => {
    try { const data = validateParse(await readSelectedFile()); previewData(data); status('XML parsed successfully. Review the preview, then generate the PDF.'); }
    catch(e){ status('Error: ' + e.message); }
  });
  $('generateBtn').addEventListener('click', async () => {
    try { const data = validateParse(await readSelectedFile()); previewData(data); const out = createPdf(data); status(`PDF generated and downloaded.\nReport number: ${out.rn}\nPages: ${out.total}\nSubjects: ${out.subjects}`); }
    catch(e){ status('Error: ' + e.message); }
  });
  $('clearBtn').addEventListener('click', () => { $('xmlFile').value=''; $('tradeNameOverride').value=''; $('serialOverride').value=''; $('preview').innerHTML=''; status('Ready.'); });
})();
</script>
</body>
</html>
